<body>
<b-container fluid id="app" style="width: 100%;">
    <b-row>
        <b-col class="text-left cap">
            <h1>{{ memleft_pic.split('.')[0] }}</h1>
        </b-col>
        <b-col>
            <div style="margin: auto; width: 265px; overflow: hidden;"><iframe src="http://ipadstopwatch.com/timer-fullscreen.html" width="500" height="250"></iframe></div>
        </b-col>
        <b-col class="text-right cap">
            <h1>{{ memright_pic.split('.')[0] }}</h1>
        </b-col>
    </b-row>
    <b-row>
        <b-col :class="{pyro: pyro=='l'}">
            <div class="before"></div>
            <div class="picmem" :class="{flip: memleft_pic.split('.')[1] == 'r'}" :style="'background-image: url(/mem/'+memleft_pic+');'" @click="uploadmem(0)"></div>
            <div class="after"></div>
        </b-col>
        <b-col class="text-center" id="vsblock">
            <h1 v-if="!isResult" style="line-height: 4; font-family: 'Charmonman', cursive; color: #afafaf;">VS</h1>
            <template v-else>
                <img class="resultleft" :src="'/pic/'+resultL+'.png'">
                <img class="resultright" :src="'/pic/'+resultR+'.png'">
            </template>
        </b-col>
        <b-col :class="{pyro: pyro=='r'}">
            <div class="before"></div>
            <div class="picmem" :class="{flip: memright_pic.split('.')[1] != 'r'}" :style="'background-image: url(/mem/'+memright_pic+');'" @click="uploadmem(1)"></div>
            <div class="after"></div>
        </b-col>
    </b-row>
    <b-row>
        <b-col class="d-none">
            
        </b-col>
    </b-row>
    <b-row class="reaction">
        <b-col class="text-center">
            <img src="/pic/rock.png"><br>
            <img src="/pic/like.png">
            <h2 :class="{hidden: isHide}">{{ reaction.LIKE }}</h2>
        </b-col>
        <b-col class="text-center">
            <img src="/pic/scissors.png"><br>
            <img src="/pic/love.png">
            <h2 :class="{hidden: isHide}">{{ reaction.LOVE }}</h2>
        </b-col>
        <b-col class="text-center">
            <img src="/pic/paper.png"><br>
            <img src="/pic/haha.png">
            <h2 :class="{hidden: isHide}">{{ reaction.HAHA }}</h2>
        </b-col>
        <b-col cols="3" class="text-center">
            <b-btn variant="warning" @click="get_result" style="width: 200px; height: 50px; font-size: 1.5em; margin-top: -30px;">เป่า ยิ้ง ฉุบ!</b-btn><br><br><br>
            <h3>{{ roundtxt }}</h3><br><br>
            <b-btn @click="hidereaction">Hide</b-btn>
            <b-btn @click="set_base">Set zero</b-btn> 
            <b-btn @click="changeround">Edit</b-btn>
            <h4>*จำนวน reaction จะแสดงทุก 2 นาที</h4>
        </b-col>
        <b-col class="text-center">
            <img src="/pic/paperR.png"><br>
            <img src="/pic/wow.png">
            <h2 :class="{hidden: isHide}">{{ reaction.WOW }}</h2>
        </b-col>
        <b-col class="text-center">
            <img src="/pic/scissorsR.png"><br>
            <img src="/pic/sad.png">
            <h2 :class="{hidden: isHide}">{{ reaction.SAD }}</h2>
        </b-col>
        <b-col class="text-center">
            <img src="/pic/rockR.png"><br>
            <img src="/pic/angry.png">
            <h2 :class="{hidden: isHide}">{{ reaction.ANGRY }}</h2>
        </b-col>
    </b-row>
    <input class="d-none" id="uploadleft" type="file" @change="uploadpic(0)">
    <input class="d-none" id="uploadright" type="file" @change="uploadpic(1)">
</b-container>
<script>

</script>
<script>
    var vm = new Vue({
        el: '#app',
        data: {
            reaction: {
                LIKE: 0,
                LOVE: 0,
                HAHA: 0,
                WOW: 0,
                SAD: 0,
                ANGRY: 0
            },
            reaction_base: {
                LIKE: 0,
                LOVE: 0,
                HAHA: 0,
                WOW: 0,
                SAD: 0,
                ANGRY: 0
            },
            reaction_raw: {
                LIKE: 0,
                LOVE: 0,
                HAHA: 0,
                WOW: 0,
                SAD: 0,
                ANGRY: 0
            },
            memleft_pic: '-.jpg',
            memright_pic: '-.jpg',
            isResult: false,
            resultL: '',
            resultR: '',
            roundtxt: 'คู่ที่ 1 กลุ่ม A',
            isHide: false,
            pyro: ''
        },
        methods: {
            updateEvent(data){
                if(!data.reaction_stream) return
                data.reaction_stream.map(x=>{
                    this.reaction_raw[x.key] = x.value
                    this.reaction[x.key] = this.reaction_raw[x.key] - this.reaction_base[x.key]
                })
            },
            set_base(){
                Object.keys(this.reaction_base).map(x=>{
                    this.reaction_base[x] = this.reaction_raw[x]
                    this.reaction[x] = this.reaction_raw[x] - this.reaction_base[x]
                })
            },
            uploadmem(isRight){
                document.querySelector(isRight ? '#uploadright' : '#uploadleft').click()
            },
            uploadpic(isRight){
                elm = document.querySelector(isRight ? '#uploadright' : '#uploadleft')
                filename = elm.files[0].name
                isRight ? this.memright_pic = filename : this.memleft_pic = filename
            },
            get_result(){
                this.isHide = false
                this.isResult = !this.isResult
                rl = this.reaction.LIKE
                sl = this.reaction.LOVE
                pl = this.reaction.HAHA
                pr = this.reaction.WOW
                sr = this.reaction.SAD
                rr = this.reaction.ANGRY
                if(this.isResult){
                    this.resultL = rl > sl && rl > pl ? 'rock' : sl > pl && sl > rl ? 'scissors' : 'paper'
                    this.resultR = rr > sr && rr > pr ? 'rockR' : sr > pr && sr > rr ? 'scissorsR' : 'paperR'
                    this.pyro = this.resultL == 'scissors' && this.resultR == 'paperR' ||
                                this.resultL == 'rock' && this.resultR == 'scissorsR' ||
                                this.resultL == 'paper' && this.resultR == 'rockR' ? 'l' :
                                this.resultL == 'scissors' && this.resultR == 'rockR' ||
                                this.resultL == 'rock' && this.resultR == 'paperR' ||
                                this.resultL == 'paper' && this.resultR == 'scissorsR' ? 'r' : ''
                    setTimeout(this.get_result, 5000)
                }
                else{
                    this.pyro = ''
                }
            },
            changeround(){
                document.body.contentEditable = document.body.contentEditable == 'inherit' ? true : 'inherit'
            },
            hidereaction(){
                this.isHide = !this.isHide
            }
        }
    })
</script>
<script>
window.fbAsyncInit = function() {
    FB.init({
    appId            : '821065378077829',
    autoLogAppEvents : true,
    xfbml            : true,
    version          : 'v8.0'
    });
    var source = new EventSource(`https://streaming-graph.facebook.com/${LIVE_ID}/live_reactions?access_token=${ACCESS_TOKEN}&fields=reaction_stream`);
    source.onmessage = function(event) {
        vm.updateEvent(JSON.parse(event.data))
    };
};
</script>
